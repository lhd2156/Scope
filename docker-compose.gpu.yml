# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build intel
services:
  intel:
    build:
      context: ./scope_intel
      dockerfile: Dockerfile.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    mem_limit: 2048m
