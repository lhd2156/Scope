map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Restore visitor addresses only when the socket peer is a Cloudflare edge.
# Direct-origin requests cannot spoof CF-Connecting-IP.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

limit_req_zone $binary_remote_addr zone=global:10m rate=600r/m;
limit_req_zone $binary_remote_addr zone=api_global:10m rate=600r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth_refresh:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=search:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=uploads:10m rate=20r/m;
limit_req_status 429;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# Security defaults applied to every response. The Core/Content services also
# set their own headers but the edge is the last line of defence for the SPA.
#
# CSP design notes:
#   * script-src is 'self' with wasm-unsafe-eval only plus Cloudflare's
#     documented Web Analytics beacon host. Vite's production build
#     never inlines <script>, so we don't need nonces and can keep normal JS
#     eval blocked while still letting the Scope WASM runtime compile.
#   * style-src keeps 'unsafe-inline' because Vue SFCs ship scoped styles at
#     build time and a handful of runtime CSS-in-JS snippets exist. This is
#     the single largest CSP-relaxation; revisit once all inline styles are
#     migrated to external sheets.
#   * require-trusted-types-for 'script' forces all DOM sinks that could
#     trigger XSS (innerHTML, eval-equivalents) to go through a Trusted
#     Types policy. Modern Chromium enforces; other browsers ignore.
#   * trusted-types allows the app policy, the PWA script-url policy, and
#     Vue's runtime policy while still rejecting unknown policy names.
#   * report-uri is wired to the Core content-service endpoint that stores
#     violations (backed off to the console in dev).
map $scheme $scope_csp_policy {
    http                    "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; connect-src 'self' https://api.mapbox.com https://events.mapbox.com https://cloudflareinsights.com https://api.open-meteo.com https://air-quality-api.open-meteo.com https://geocoding-api.open-meteo.com https://*.ingest.us.sentry.io ws: wss: ; worker-src 'self' blob:; manifest-src 'self'; require-trusted-types-for 'script'; trusted-types default scope scope-html scope-pwa scope-mapbox vue; report-uri /api/csp-report";
    default                 "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; connect-src 'self' https://api.mapbox.com https://events.mapbox.com https://cloudflareinsights.com https://api.open-meteo.com https://air-quality-api.open-meteo.com https://geocoding-api.open-meteo.com https://*.ingest.us.sentry.io ws: wss: ; worker-src 'self' blob:; manifest-src 'self'; require-trusted-types-for 'script'; trusted-types default scope scope-html scope-pwa scope-mapbox vue; block-all-mixed-content; upgrade-insecure-requests; report-uri /api/csp-report";
}

map $scheme $scope_hsts_header {
    https                   "max-age=63072000; includeSubDomains; preload";
    default                 "";
}

# HTTP -> HTTPS redirect. Any plaintext request is immediately punted to TLS
# unless it's the ACME HTTP-01 challenge or a local /healthz probe. This runs
# only when TLS is enabled by mounting cert material into /etc/nginx/certs.
# In local dev (no cert files) the main server block below listens on :80 too.
server {
    listen 8080;
    listen [::]:8080;
    server_name scopetrips.com www.scopetrips.com api.scopetrips.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"nginx-redirect"}';
    }

    # Only redirect when a TLS cert is actually present on disk. This lets
    # the same image work in dev (no cert, no redirect) and prod (cert
    # mounted, redirect on) without a separate config flavor.
    if (-f /etc/nginx/certs/fullchain.pem) {
        return 308 https://$host$request_uri;
    }

    return 404;
}

server {
    # HTTP/2 gives the SPA parallel multiplexed streams over a single TCP
    # connection; saves 100-300ms on cold loads. The :443 block is activated
    # automatically if a cert is mounted at /etc/nginx/certs/. See
    # scripts/nginx/generate-dev-cert.sh for local dev material.
    listen 8080 default_server;
    listen [::]:8080 default_server;
    listen 8443 ssl default_server;
    listen [::]:8443 ssl default_server;
    http2 on;

    # TLS configuration. Mozilla Intermediate profile (2025) — disables TLS 1.0/1.1,
    # restricts to forward-secret AEAD ciphers, enables OCSP stapling-ready config.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    server_name _;

    server_tokens off;
    # Docker's embedded DNS resolver. `valid=30s` re-resolves periodically so
    # we pick up new/removed replicas without an nginx reload. `ipv6=off`
    # avoids spurious AAAA lookups against Docker's IPv4-only DNS.
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Hide upstream stack fingerprints.
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-AspNetMvc-Version;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Cross-Origin-Opener-Policy;
    proxy_hide_header Cross-Origin-Resource-Policy;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/json application/javascript application/xml+rss
        application/xml application/wasm application/rss+xml
        image/svg+xml application/atom+xml application/vnd.api+json
        application/manifest+json font/ttf font/otf;
    gzip_vary on;

    # Proxy buffer tuning for JSON APIs. The defaults (8 buffers of 4K) stream
    # responses fine but thrash the event loop on payloads larger than a
    # single buffer. Sizing buffers to 16K x 16 keeps typical list responses
    # (30-80KB after gzip) fully in memory before streaming to the client and
    # cuts small-write syscalls. `proxy_busy_buffers_size` caps how much can
    # be sent to a slow client before nginx backpressures the upstream.
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;
    # Avoid storing request bodies to disk for small JSON POSTs; spills over
    # to disk only for payloads larger than this (photo uploads).
    client_body_buffer_size 32k;
    # TCP-level tuning: sendfile + tcp_nopush + tcp_nodelay is the canonical
    # combo for low-latency proxied responses over keepalive connections.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Keep request bodies small by default; photo uploads use a dedicated location.
    client_max_body_size 10m;
    client_body_timeout 15s;
    client_header_timeout 10s;
    send_timeout 30s;
    keepalive_timeout 65s;

    limit_conn perip 100;

    # Global response security headers. HSTS and automatic insecure-request
    # upgrades are HTTPS-only so local HTTP smoke tests do not rewrite same-origin
    # assets to https://localhost:8088 and strand WebKit on a blank page.
    include /etc/nginx/snippets/scope-security-headers.conf;

    # HTTP/1.1 + empty Connection header at server scope so every proxied
    # request uses HTTP/1.1 to upstream (required for chunked responses and
    # SSE). Individual location blocks override Connection when they need
    # WebSocket upgrades.
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"nginx"}';
    }

    # RFC 9116 security.txt — machine-readable security contact.
    # Keep the plaintext and .well-known copies in sync.
    location = /security.txt {
        default_type text/plain;
        include /etc/nginx/snippets/scope-security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        return 200 'Contact: mailto:security@scopetrips.com\nExpires: 2099-01-01T00:00:00.000Z\nPreferred-Languages: en\nCanonical: https://$host/.well-known/security.txt\nPolicy: https://$host/security\n';
    }

    location = /.well-known/security.txt {
        default_type text/plain;
        include /etc/nginx/snippets/scope-security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        return 200 'Contact: mailto:security@scopetrips.com\nExpires: 2099-01-01T00:00:00.000Z\nPreferred-Languages: en\nCanonical: https://$host/.well-known/security.txt\nPolicy: https://$host/security\n';
    }

    # Conservative robots policy: allow the marketing surface, disallow APIs
    # and private routes. Override per-route as needed.
    location = /robots.txt {
        default_type text/plain;
        include /etc/nginx/snippets/scope-security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        return 200 'User-agent: *\nDisallow: /api/\nDisallow: /friends\nDisallow: /profile\nDisallow: /settings\nDisallow: /trips\nDisallow: /compose\nDisallow: /metrics\nAllow: /\n';
    }

    # Block direct access to /metrics from the public edge; metrics are scraped
    # in-cluster via the service network.
    location = /metrics { deny all; return 403; }

    # limit_req generates its own 429 before proxying. Give clients the same
    # machine-readable contract as application-level rate limiters. Proxied
    # 429 responses are still passed through because proxy_intercept_errors is
    # intentionally left disabled.
    error_page 429 = @edge_rate_limited;
    location @edge_rate_limited {
        internal;
        default_type application/json;
        include /etc/nginx/snippets/scope-security-headers.conf;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "60" always;
        return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many requests","details":[]}}';
    }

    # Swallow CSP violation reports. We don't want browsers hammering a
    # non-existent upstream on every policy mismatch, so we terminate at the
    # edge and 204 them. In prod, swap this for a Content-service endpoint
    # that persists reports to the SIEM (see SECURITY.md).
    location = /api/csp-report {
        access_log off;
        return 204;
    }

    # Common scanner honeypots — respond fast and stop logging.
    location ~* ^/(wp-admin|wp-login|xmlrpc\.php|\.env|\.git|phpmyadmin)(/|$) {
        access_log off;
        return 404;
    }

    # Variable-based upstreams force nginx to re-resolve DNS on every request
    # through the `resolver` above. This is the ONLY stock-nginx pattern that
    # picks up new replicas on `docker compose up --scale`, rolling deploys,
    # and container replacements without an nginx reload. The tradeoff is that
    # we don't get upstream connection pooling (each request opens a fresh
    # socket), but the dynamic-scaling correctness is worth the ~1-3ms/request
    # overhead. If/when we move behind a k8s Ingress or an ALB, it will do the
    # keepalive pooling for us.

    location = /api/core/auth/refresh {
        limit_req zone=auth_refresh burst=40 nodelay;
        set $core_upstream http://core:8080;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location = /api/core/auth/me {
        limit_req zone=api_global burst=120 nodelay;
        set $core_upstream http://core:8080;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location = /api/core/auth/logout {
        limit_req zone=api_global burst=120 nodelay;
        set $core_upstream http://core:8080;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /api/core/auth {
        limit_req zone=auth burst=5 nodelay;
        set $core_upstream http://core:8080;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # SPA route hydration fans out across Core/Content/Intel and real users
    # often sit behind shared NATs. Keep auth/uploads tight, but give general
    # JSON APIs enough burst room that normal app boot does not become a 429.
    location /api/core {
        limit_req zone=api_global burst=120 nodelay;
        set $core_upstream http://core:8080;
        proxy_pass $core_upstream;
        # WebSocket/SignalR hops: override the blank Connection header set at
        # server scope when the client is upgrading.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /api/content/photos {
        limit_req zone=uploads burst=10 nodelay;
        client_max_body_size 20m;
        set $content_upstream http://content:8000;
        proxy_pass $content_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        # Stream uploads straight through to the Content service instead of
        # buffering the full 20MB to nginx's temp disk first. Cuts perceived
        # upload latency roughly in half on large files and avoids a disk
        # hotspot when many users upload simultaneously.
        proxy_request_buffering off;
        # Photo uploads can take longer than default read timeout while the
        # server writes to S3 and generates the thumbnail synchronously.
        # Async mode (PHOTO_UPLOAD_ASYNC_THUMBNAILS=true) returns much faster
        # but this ceiling still covers the sync fallback path.
        proxy_read_timeout 60s;
        # Photo upload path is NOT safe to retry — a half-uploaded multipart
        # would result in duplicate photos. Disable proxy_next_upstream.
        proxy_next_upstream off;
    }

    location /api/content/search {
        limit_req zone=search burst=30 nodelay;
        set $content_upstream http://content:8000;
        proxy_pass $content_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /api/content {
        limit_req zone=api_global burst=120 nodelay;
        set $content_upstream http://content:8000;
        proxy_pass $content_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        # Only retry on idempotent methods; non_idempotent=off (the default)
        # avoids retrying POST/PUT/DELETE which may have side effects.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /api/intel {
        limit_req zone=api_global burst=120 nodelay;
        set $intel_upstream http://intel:5000;
        proxy_pass $intel_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        # Intel runs ML inference and local Ollama agent workflows; allow
        # longer reads for CPU-bound model generation.
        proxy_read_timeout 180s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /api/rag/ {
        limit_req zone=api_global burst=120 nodelay;
        set $rag_upstream http://rag:8100;
        proxy_pass $rag_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        # Local Ollama RAG generation can be slow on CPU-only developer hosts.
        proxy_read_timeout 180s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location = /api/metrics/health {
        limit_req zone=api_global burst=120 nodelay;
        set $metrics_upstream http://scope-metrics:9090;
        proxy_pass $metrics_upstream/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location ^~ /api/ {
        default_type application/json;
        return 404 '{"error":"api_route_not_found"}';
    }

    location = /site {
        return 308 /site/;
    }

    location = /favicon.svg {
        set $site_upstream http://site:3000;
        proxy_pass $site_upstream;
        proxy_set_header Host $host;
        expires 1d;
    }

    location = /og-image.png {
        set $site_upstream http://site:3000;
        proxy_pass $site_upstream;
        proxy_set_header Host $host;
        expires 1d;
    }

    location /site/ {
        set $site_upstream http://site:3000;
        rewrite ^/site/(.*)$ /$1 break;
        proxy_pass $site_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' wss:; worker-src 'self' blob:; manifest-src 'self'; block-all-mixed-content; upgrade-insecure-requests" always;
    }

    location = /admin {
        return 308 /admin/;
    }

    location /admin/ {
        set $admin_upstream http://admin:8081;
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
    }

    # When Content falls back to local filesystem media instead of S3, nginx
    # proxies those assets through Django so uploaded photos remain reachable
    # across deploys. The service returns cache-friendly URLs under /media/.
    location ^~ /media/ {
        set $content_upstream http://content:8000;
        proxy_pass $content_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
        include /etc/nginx/snippets/scope-security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        proxy_hide_header Set-Cookie;
    }

    # Frontend build artifacts are hash-stamped by Vite (e.g.
    # `assets/index-a1b2c3d4.js`), so they can be cached forever at the edge
    # and by the browser. Anything outside `/assets/` — including index.html
    # — stays uncached so a new deploy is visible on the next navigation.
    location ^~ /assets/ {
        set $frontend_upstream http://frontend:8080;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        include /etc/nginx/snippets/scope-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Drop some headers that the SPA doesn't benefit from on static GETs.
        proxy_hide_header Set-Cookie;
    }

    location / {
        set $frontend_upstream http://frontend:8080;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
