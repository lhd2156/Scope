name: Bug report
description: Report a functional defect in Scope (not a security issue).
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        > Do **not** file security vulnerabilities here. Use the private
        > [Security Advisories](../security/advisories/new) channel instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the defect.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. Observe '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: e.g. Chrome 135 on macOS, staging cluster us-east-1
    validations:
      required: false
