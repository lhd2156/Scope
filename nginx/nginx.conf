map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=global:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=uploads:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# Security defaults applied to every response. The Core/Content services also
# set their own headers but the edge is the last line of defence for the SPA.
map $sent_http_content_type $atlas_csp_policy {
    default                 "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https://api.mapbox.com https://events.mapbox.com wss: ; worker-src 'self' blob:; manifest-src 'self'";
}

server {
    # HTTP/2 gives the SPA parallel multiplexed streams over a single TCP
    # connection; saves 100-300ms on cold loads. When TLS terminates here
    # (not at an ALB) add `ssl` to the listen directives and bind :443.
    listen 80 default_server;
    listen [::]:80 default_server;
    # listen 443 ssl http2 default_server;
    # listen [::]:443 ssl http2 default_server;
    server_name _;

    server_tokens off;
    # Docker's embedded DNS resolver. `valid=30s` re-resolves periodically so
    # we pick up new/removed replicas without an nginx reload. `ipv6=off`
    # avoids spurious AAAA lookups against Docker's IPv4-only DNS.
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    # Hide upstream stack fingerprints.
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-AspNetMvc-Version;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/json application/javascript application/xml+rss
        application/xml application/wasm application/rss+xml
        image/svg+xml application/atom+xml application/vnd.api+json
        application/manifest+json font/ttf font/otf;
    gzip_vary on;

    # Proxy buffer tuning for JSON APIs. The defaults (8 buffers of 4K) stream
    # responses fine but thrash the event loop on payloads larger than a
    # single buffer. Sizing buffers to 16K x 16 keeps typical list responses
    # (30-80KB after gzip) fully in memory before streaming to the client and
    # cuts small-write syscalls. `proxy_busy_buffers_size` caps how much can
    # be sent to a slow client before nginx backpressures the upstream.
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;
    # Avoid storing request bodies to disk for small JSON POSTs; spills over
    # to disk only for payloads larger than this (photo uploads).
    client_body_buffer_size 32k;
    # TCP-level tuning: sendfile + tcp_nopush + tcp_nodelay is the canonical
    # combo for low-latency proxied responses over keepalive connections.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Keep request bodies small by default; photo uploads use a dedicated location.
    client_max_body_size 10m;
    client_body_timeout 15s;
    client_header_timeout 10s;
    send_timeout 30s;
    keepalive_timeout 65s;

    limit_conn perip 100;

    # Global response security headers (safe for both HTTP dev and HTTPS prod).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Content-Security-Policy $atlas_csp_policy always;

    # HTTP/1.1 + empty Connection header at server scope so every proxied
    # request uses HTTP/1.1 to upstream (required for chunked responses and
    # SSE). Individual location blocks override Connection when they need
    # WebSocket upgrades.
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location = /healthz {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy","service":"nginx"}';
    }

    # RFC 9116 security.txt — machine-readable security contact.
    # Keep the plaintext and .well-known copies in sync.
    location = /security.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600" always;
        return 200 'Contact: mailto:security@atlas.dev\nExpires: 2099-01-01T00:00:00.000Z\nPreferred-Languages: en\nCanonical: https://$host/.well-known/security.txt\nPolicy: https://$host/security-policy\n';
    }

    location = /.well-known/security.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600" always;
        return 200 'Contact: mailto:security@atlas.dev\nExpires: 2099-01-01T00:00:00.000Z\nPreferred-Languages: en\nCanonical: https://$host/.well-known/security.txt\nPolicy: https://$host/security-policy\n';
    }

    # Conservative robots policy: allow the marketing surface, disallow APIs
    # and private routes. Override per-route as needed.
    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600" always;
        return 200 'User-agent: *\nDisallow: /api/\nDisallow: /friends\nDisallow: /profile\nDisallow: /settings\nDisallow: /trips\nDisallow: /compose\nDisallow: /metrics\nAllow: /\n';
    }

    # Block direct access to /metrics from the public edge; metrics are scraped
    # in-cluster via the service network.
    location = /metrics { deny all; return 403; }

    # Common scanner honeypots — respond fast and stop logging.
    location ~* ^/(wp-admin|wp-login|xmlrpc\.php|\.env|\.git|phpmyadmin)(/|$) {
        access_log off;
        return 404;
    }

    # Variable-based upstreams force nginx to re-resolve DNS on every request
    # through the `resolver` above. This is the ONLY stock-nginx pattern that
    # picks up new replicas on `docker compose up --scale`, rolling deploys,
    # and container replacements without an nginx reload. The tradeoff is that
    # we don't get upstream connection pooling (each request opens a fresh
    # socket), but the dynamic-scaling correctness is worth the ~1-3ms/request
    # overhead. If/when we move behind a k8s Ingress or an ALB, it will do the
    # keepalive pooling for us.

    location /api/core/auth {
        limit_req zone=auth burst=5 nodelay;
        set $core_upstream http://core:8080;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /api/core {
        limit_req zone=global burst=30 nodelay;
        set $core_upstream http://core:8080;
        proxy_pass $core_upstream;
        # WebSocket/SignalR hops: override the blank Connection header set at
        # server scope when the client is upgrading.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /api/content/photos {
        limit_req zone=uploads burst=10 nodelay;
        client_max_body_size 20m;
        set $content_upstream http://content:8000;
        proxy_pass $content_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        # Stream uploads straight through to the Content service instead of
        # buffering the full 20MB to nginx's temp disk first. Cuts perceived
        # upload latency roughly in half on large files and avoids a disk
        # hotspot when many users upload simultaneously.
        proxy_request_buffering off;
        # Photo uploads can take longer than default read timeout while the
        # server writes to S3 and generates the thumbnail synchronously.
        # Async mode (PHOTO_UPLOAD_ASYNC_THUMBNAILS=true) returns much faster
        # but this ceiling still covers the sync fallback path.
        proxy_read_timeout 60s;
        # Photo upload path is NOT safe to retry — a half-uploaded multipart
        # would result in duplicate photos. Disable proxy_next_upstream.
        proxy_next_upstream off;
    }

    location /api/content {
        limit_req zone=global burst=20 nodelay;
        set $content_upstream http://content:8000;
        proxy_pass $content_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        # Only retry on idempotent methods; non_idempotent=off (the default)
        # avoids retrying POST/PUT/DELETE which may have side effects.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /api/intel {
        limit_req zone=global burst=10 nodelay;
        set $intel_upstream http://intel:5000;
        proxy_pass $intel_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        # Intel runs ML inference; allow longer read for model warm-up /
        # batched predictions. Pairs with Gunicorn's --timeout 60.
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # Frontend build artifacts are hash-stamped by Vite (e.g.
    # `assets/index-a1b2c3d4.js`), so they can be cached forever at the edge
    # and by the browser. Anything outside `/assets/` — including index.html
    # — stays uncached so a new deploy is visible on the next navigation.
    location ^~ /assets/ {
        set $frontend_upstream http://frontend:8080;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Drop some headers that the SPA doesn't benefit from on static GETs.
        proxy_hide_header Set-Cookie;
    }

    location / {
        set $frontend_upstream http://frontend:8080;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
