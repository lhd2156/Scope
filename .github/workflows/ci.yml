name: Atlas CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'feature/**'

concurrency:
  group: atlas-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    env:
      ACCEPT_EULA: Y
      SA_PASSWORD: Atlas_Dev_2026!
      CORE_JWT_SECRET: ci-core-jwt-secret-please-change
      CORE_JWT_ISSUER: atlas-core
      CORE_JWT_AUDIENCE: atlas-frontend
      DJANGO_SECRET_KEY: ci-django-secret-key
      DJANGO_DEBUG: 'true'
      FLASK_SECRET_KEY: ci-flask-secret-key
      FLASK_ENV: development
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: atlas-photos-ci
      VITE_MAPBOX_TOKEN: pk.test-ci-token
      VITE_API_BASE_URL: /
      VITE_ENABLE_AUTH_MOCK_FALLBACK: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config > /tmp/atlas-compose.yaml

  infrastructure-validate:
    name: Validate infrastructure assets
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Validate YAML assets
        run: |
          for file in k8s/*.yaml .github/workflows/ci.yml .github/workflows/deploy.yml; do
            npx --yes yaml@2 valid "$file"
          done

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  core:
    name: Core build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Atlas.Core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Atlas.Core.sln

      - name: Build
        run: dotnet build Atlas.Core.sln --configuration Release --no-restore

      - name: Test
        env:
          CORE_JWT_SECRET: ci-core-jwt-secret-please-change
          CORE_JWT_ISSUER: atlas-core
          CORE_JWT_AUDIENCE: atlas-frontend
          SQL_SA_PASSWORD: Atlas_Dev_2026!
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: dotnet test Atlas.Core.sln --configuration Release --no-build

  content:
    name: Content checks and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas_content
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: atlas_content/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Django system check
        env:
          DJANGO_SECRET_KEY: ci-django-secret-key
          DEBUG: 'true'
          ALLOWED_HOSTS: localhost,127.0.0.1
          FRONTEND_ORIGIN: http://localhost:5173
          CORE_JWT_SECRET: ci-core-jwt-secret-please-change
          CORE_JWT_ISSUER: atlas-core
          CORE_JWT_AUDIENCE: atlas-frontend
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_ENABLED: 'false'
        run: python manage.py check

      - name: Pytest
        env:
          DJANGO_SECRET_KEY: ci-django-secret-key
          DEBUG: 'true'
          ALLOWED_HOSTS: localhost,127.0.0.1
          FRONTEND_ORIGIN: http://localhost:5173
          CORE_JWT_SECRET: ci-core-jwt-secret-please-change
          CORE_JWT_ISSUER: atlas-core
          CORE_JWT_AUDIENCE: atlas-frontend
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_ENABLED: 'false'
        run: pytest

  intel:
    name: Intel tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas_intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: atlas_intel/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Pytest
        env:
          FLASK_ENV: development
          FLASK_SECRET_KEY: ci-flask-secret-key
          CORE_JWT_SECRET: ci-core-jwt-secret-please-change
          CORE_JWT_ISSUER: atlas-core
          CORE_JWT_AUDIENCE: atlas-frontend
          FRONTEND_ORIGIN: http://localhost:5173
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          CONTENT_SERVICE_URL: http://localhost:8000/api/content
        run: pytest

  frontend:
    name: Frontend build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: atlas-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: /
          VITE_MAPBOX_TOKEN: pk.test-ci-token
          VITE_ENABLE_AUTH_MOCK_FALLBACK: 'false'
        run: npm run build

      - name: Unit tests
        env:
          VITE_API_BASE_URL: /
          VITE_MAPBOX_TOKEN: pk.test-ci-token
          VITE_ENABLE_AUTH_MOCK_FALLBACK: 'false'
        run: npm run test
