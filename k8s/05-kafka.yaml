apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: scope
  labels:
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: 2181
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zookeeper-data
  namespace: scope
  labels:
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/part-of: scope-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zookeeper-log
  namespace: scope
  labels:
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/part-of: scope-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: scope
  labels:
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zookeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zookeeper
        app.kubernetes.io/part-of: scope-platform
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.9.7@sha256:b692a1dafdccd09dd2a9e109a4da1e74835d82907099028a6aa691df002d9375
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 2181
              name: client
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
            - name: KAFKA_HEAP_OPTS
              value: "-Xms64m -Xmx128m"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/kafka
            - name: data
              mountPath: /var/lib/zookeeper/data
            - name: log
              mountPath: /var/lib/zookeeper/log
            - name: runtime-logs
              mountPath: /var/log/kafka
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: zookeeper-data
        - name: log
          persistentVolumeClaim:
            claimName: zookeeper-log
        - name: runtime-logs
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: scope
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  namespace: scope
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: scope-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: scope
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: scope-platform
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.9.7@sha256:d879d4b81bccb61c9b11f2e69dfcbc4219ea474f6c0df48cc89e75efed82cecb
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 9092
              name: broker
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_HEAP_OPTS
              value: "-Xms128m -Xmx256m"
            - name: KAFKA_JVM_PERFORMANCE_OPTS
              value: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/kafka
            - name: data
              mountPath: /var/lib/kafka/data
            - name: runtime-logs
              mountPath: /var/log/kafka
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: kafka-data
        - name: runtime-logs
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-init
  namespace: scope
  labels:
    app.kubernetes.io/name: kafka-topic-init
    app.kubernetes.io/part-of: scope-platform
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-topic-init
        app.kubernetes.io/part-of: scope-platform
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kafka-topic-init
          image: confluentinc/cp-kafka:7.9.7@sha256:d879d4b81bccb61c9b11f2e69dfcbc4219ea474f6c0df48cc89e75efed82cecb
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              BROKER=kafka:9092
              until kafka-broker-api-versions --bootstrap-server "$BROKER" >/dev/null 2>&1; do
                sleep 5
              done
              create() {
                topic=$1
                partitions=$2
                kafka-topics --bootstrap-server "$BROKER" --create --if-not-exists \
                  --topic "$topic" --partitions "$partitions" --replication-factor 1
              }
              create photo.thumbnail.requested 6
              create photo.thumbnail.ready 3
              create photo.thumbnail.failed 3
              create photo.uploaded 3
              create interaction.recorded 6
              create spot.created 3
              create spot.updated 3
              create spot.liked 3
              create review.created 3
              create comment.created 3
              create mention.created 3
              create trip.created 3
              create trip.deleted 3
              create trip.member.added 3
              create friend.accepted 3
              create friend.removed 3
              create friend.rejected 3
              create user.registered 3
              create user.updated 3
              create user.email_verification_requested 3
              create user.password_reset_requested 3
              create user.password_changed 3
              create live.location.updated 3
              create live.session.stopped 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: runtime-logs
              mountPath: /var/log/kafka
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: runtime-logs
          emptyDir:
            sizeLimit: 256Mi
        - name: tmp
          emptyDir: {}
