version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: nuget
    directory: /Scope.Core
    schedule:
      interval: weekly
      day: monday
      time: '09:10'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - dotnet
    groups:
      dotnet-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /scope_content
    schedule:
      interval: weekly
      day: monday
      time: '09:20'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - python
    groups:
      content-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /scope_intel
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - python
    groups:
      intel-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /scope-frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:40'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - frontend
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch
      # Keep lockstep tooling consistent
      vitest:
        patterns:
          - '@vitest/*'
          - 'vitest'
      vue-core:
        patterns:
          - 'vue'
          - '@vue/*'
          - 'vue-router'
          - 'pinia'

  - package-ecosystem: docker
    directory: /Scope.Core
    schedule:
      interval: weekly
      day: monday
      time: '09:50'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /scope_content
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /scope_intel
    schedule:
      interval: weekly
      day: monday
      time: '10:10'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /scope-frontend
    schedule:
      interval: weekly
      day: monday
      time: '10:20'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /nginx
    schedule:
      interval: weekly
      day: monday
      time: '10:30'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker
