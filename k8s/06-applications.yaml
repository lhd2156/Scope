apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: scope
  labels:
    app.kubernetes.io/name: core
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: core
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: scope
  labels:
    app.kubernetes.io/name: core
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core
        app.kubernetes.io/part-of: scope-platform
    spec:
      containers:
        - name: core
          image: ghcr.io/replace-me/scope-core:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: scope-shared-config
          env:
            - name: CORE_DB_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: CORE_DB_CONNECTION
            - name: ConnectionStrings__CoreDatabase
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: ConnectionStrings__CoreDatabase
            - name: CORE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: CORE_JWT_SECRET
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 768Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
