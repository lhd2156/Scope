apiVersion: v1
kind: Secret
metadata:
  name: scope-secrets
  namespace: scope
  labels:
    app.kubernetes.io/name: scope
    app.kubernetes.io/part-of: scope-platform
type: Opaque
stringData:
  SA_PASSWORD: change-me-sql-password
  CORE_DB_CONNECTION: Server=sqlserver,1433;Database=ScopeDb;User Id=sa;Password=change-me-sql-password;Encrypt=True;TrustServerCertificate=True;Min Pool Size=5;Max Pool Size=100;Connection Timeout=15;MultipleActiveResultSets=true
  ConnectionStrings__CoreDatabase: Server=sqlserver,1433;Database=ScopeDb;User Id=sa;Password=change-me-sql-password;Encrypt=True;TrustServerCertificate=True;Min Pool Size=5;Max Pool Size=100;Connection Timeout=15;MultipleActiveResultSets=true
  CORE_JWT_SECRET: change-me-core-jwt-secret
  GRPC_INTERNAL_TOKEN: change-me-grpc-internal-token-at-least-32-chars
  WEB_PUSH_PRIVATE_KEY: change-me-web-push-private-key
  DJANGO_SECRET_KEY: change-me-django-secret
  FLASK_SECRET_KEY: change-me-flask-secret
  AWS_ACCESS_KEY_ID: change-me-aws-access-key-id
  AWS_SECRET_ACCESS_KEY: change-me-aws-secret-access-key
  GEMINI_API_KEY: optional-gemini-api-key
  GRAFANA_ADMIN_USER: admin
  GRAFANA_ADMIN_PASSWORD: change-me-grafana-admin-password
  VITE_MAPBOX_TOKEN: change-me-mapbox-token
