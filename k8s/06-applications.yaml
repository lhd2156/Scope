apiVersion: batch/v1
kind: CronJob
metadata:
  name: scope-cli-health
  namespace: scope
  labels:
    app.kubernetes.io/name: scope-cli
    app.kubernetes.io/part-of: scope-platform
spec:
  schedule: "*/30 * * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: scope-cli
            app.kubernetes.io/part-of: scope-platform
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10006
            runAsGroup: 10006
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: scope-cli
              image: ghcr.io/lhd2156/scope/scope-cli:deploy-placeholder
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              args:
                - health
                - --verbose
              env:
                - name: SCOPE_CORE_HEALTH_URL
                  value: http://core:8080/api/core/health
                - name: SCOPE_CONTENT_HEALTH_URL
                  value: http://content:8000/api/content/health
                - name: SCOPE_INTEL_HEALTH_URL
                  value: http://intel:5000/api/intel/health
                - name: SCOPE_METRICS_HEALTH_URL
                  value: http://scope-metrics:9090/healthz
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: scope
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: scope
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: scope-platform
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/lhd2156/scope/scope-frontend:deploy-placeholder
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
