apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  namespace: scope
  labels:
    app.kubernetes.io/name: sqlserver
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: sqlserver
  ports:
    - name: tds
      port: 1433
      targetPort: 1433
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserver-data
  namespace: scope
  labels:
    app.kubernetes.io/name: sqlserver
    app.kubernetes.io/part-of: scope-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sqlserver
  namespace: scope
  labels:
    app.kubernetes.io/name: sqlserver
    app.kubernetes.io/part-of: scope-platform
spec:
  serviceName: sqlserver
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sqlserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sqlserver
        app.kubernetes.io/part-of: scope-platform
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 0
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-CU25-ubuntu-22.04@sha256:e07b9699a2b749969f19d86563ceeea22bd3a69f7f1db85a8d1ac4bdaf0c6f56
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 1433
              name: tds
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: Express
            - name: MSSQL_MEMORY_LIMIT_MB
              value: "512"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: SA_PASSWORD
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: SA_PASSWORD
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
            - name: tmp
              mountPath: /tmp
            - name: system
              mountPath: /.system
            - name: log
              mountPath: /log
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: sqlserver-data
          persistentVolumeClaim:
            claimName: sqlserver-data
        - name: tmp
          emptyDir: {}
        - name: system
          emptyDir:
            sizeLimit: 64Mi
        - name: log
          emptyDir:
            sizeLimit: 64Mi
