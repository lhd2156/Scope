apiVersion: v1
kind: Service
metadata:
  name: scope-metrics
  namespace: scope
  labels:
    app.kubernetes.io/name: scope-metrics
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: scope-metrics
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scope-metrics
  namespace: scope
  labels:
    app.kubernetes.io/name: scope-metrics
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scope-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scope-metrics
        app.kubernetes.io/part-of: scope-platform
    spec:
      containers:
        - name: scope-metrics
          image: ghcr.io/replace-me/scope-metrics:latest
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: SCOPE_CORE_HEALTH_URL
              value: http://core:8080/api/core/health
            - name: SCOPE_CONTENT_HEALTH_URL
              value: http://content:8000/api/content/health
            - name: SCOPE_INTEL_HEALTH_URL
              value: http://intel:5000/api/intel/health
            - name: SCOPE_HEALTH_TIMEOUT_SECONDS
              value: "5"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scope-cli-health
  namespace: scope
  labels:
    app.kubernetes.io/name: scope-cli
    app.kubernetes.io/part-of: scope-platform
spec:
  schedule: "*/30 * * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: scope-cli
            app.kubernetes.io/part-of: scope-platform
        spec:
          restartPolicy: Never
          containers:
            - name: scope-cli
              image: ghcr.io/replace-me/scope-cli:latest
              args:
                - health
                - --verbose
              env:
                - name: SCOPE_CORE_HEALTH_URL
                  value: http://core:8080/api/core/health
                - name: SCOPE_CONTENT_HEALTH_URL
                  value: http://content:8000/api/content/health
                - name: SCOPE_INTEL_HEALTH_URL
                  value: http://intel:5000/api/intel/health
                - name: SCOPE_METRICS_HEALTH_URL
                  value: http://scope-metrics:9090/healthz
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 128Mi
---
