services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: atlas-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Express
      MSSQL_MEMORY_LIMIT_MB: ${SQLSERVER_MEMORY_LIMIT_MB:-512}
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./scripts/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    mem_limit: 768m

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: atlas-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: ${ZOOKEEPER_HEAP_OPTS:- -Xms64m -Xmx128m}
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 256m

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: atlas-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_JMX_PORT: 9999
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xms128m -Xmx256m}
      KAFKA_JVM_PERFORMANCE_OPTS: ${KAFKA_JVM_PERFORMANCE_OPTS:--XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35}
    ports:
      - "${KAFKA_PORT:-9092}:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 45s
    mem_limit: 512m

  core:
    build:
      context: ./Atlas.Core
    container_name: atlas-core
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      SQL_SA_PASSWORD: ${SA_PASSWORD}
      CORE_DB_CONNECTION: Server=sqlserver,1433;Database=AtlasDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      ConnectionStrings__CoreDatabase: Server=sqlserver,1433;Database=AtlasDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      CORE_JWT_SECRET: ${CORE_JWT_SECRET}
      CORE_JWT_ISSUER: ${CORE_JWT_ISSUER}
      CORE_JWT_AUDIENCE: ${CORE_JWT_AUDIENCE}
      CORE_FRONTEND_ORIGIN: http://localhost:${NGINX_PORT:-80}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    expose:
      - "8080"
    mem_limit: 768m

  content:
    build:
      context: ./atlas_content
    container_name: atlas-content
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DJANGO_DEBUG:-true}
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,content,nginx}
      FRONTEND_ORIGIN: http://localhost:${NGINX_PORT:-80}
      CORE_FRONTEND_ORIGIN: http://localhost:${NGINX_PORT:-80}
      CORE_JWT_SECRET: ${CORE_JWT_SECRET}
      CORE_JWT_ISSUER: ${CORE_JWT_ISSUER}
      CORE_JWT_AUDIENCE: ${CORE_JWT_AUDIENCE}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_ENABLED: "true"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    expose:
      - "8000"
    mem_limit: 512m

  intel:
    build:
      context: ./atlas_intel
    container_name: atlas-intel
    restart: unless-stopped
    depends_on:
      content:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      FRONTEND_ORIGIN: http://localhost:${NGINX_PORT:-80}
      CORE_FRONTEND_ORIGIN: http://localhost:${NGINX_PORT:-80}
      CORE_JWT_SECRET: ${CORE_JWT_SECRET}
      CORE_JWT_ISSUER: ${CORE_JWT_ISSUER}
      CORE_JWT_AUDIENCE: ${CORE_JWT_AUDIENCE}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      CONTENT_SERVICE_URL: http://content:8000/api/content
      AWS_REGION: ${AWS_REGION}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    expose:
      - "5000"
    mem_limit: 512m

  atlas-metrics:
    build:
      context: ./atlas-metrics
    container_name: atlas-metrics
    restart: unless-stopped
    depends_on:
      core:
        condition: service_started
      content:
        condition: service_started
      intel:
        condition: service_started
    environment:
      ATLAS_CORE_HEALTH_URL: http://core:8080/api/core/health
      ATLAS_CONTENT_HEALTH_URL: http://content:8000/api/content/health
      ATLAS_INTEL_HEALTH_URL: http://intel:5000/api/intel/health
      ATLAS_HEALTH_TIMEOUT_SECONDS: ${ATLAS_HEALTH_TIMEOUT_SECONDS:-5}
      ATLAS_METRICS_PORT: ${ATLAS_METRICS_PORT:-9090}
    ports:
      - "${ATLAS_METRICS_PORT:-9090}:9090"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:9090/healthz || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    mem_limit: 128m

  atlas-cli:
    build:
      context: ./atlas-cli
    profiles:
      - ops
    restart: "no"
    depends_on:
      core:
        condition: service_started
      content:
        condition: service_started
      intel:
        condition: service_started
      atlas-metrics:
        condition: service_started
    working_dir: /workspace
    environment:
      ATLAS_CORE_HEALTH_URL: http://core:8080/api/core/health
      ATLAS_CONTENT_HEALTH_URL: http://content:8000/api/content/health
      ATLAS_INTEL_HEALTH_URL: http://intel:5000/api/intel/health
      ATLAS_METRICS_HEALTH_URL: http://atlas-metrics:9090/healthz
      ATLAS_ENV_FILE: /workspace/.env
      ATLAS_ENV_EXAMPLE_FILE: /workspace/.env.example
      ATLAS_SEED_DIRECTORY: /workspace/scripts/sql
    volumes:
      - ./:/workspace:ro
    command:
      - health
      - --verbose
    mem_limit: 96m

  frontend:
    build:
      context: .
      dockerfile: ./atlas-frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        VITE_CSRF_ENDPOINT: ${VITE_CSRF_ENDPOINT:-}
        VITE_ENABLE_AUTH_MOCK_FALLBACK: ${VITE_ENABLE_AUTH_MOCK_FALLBACK:-false}
    container_name: atlas-frontend
    restart: unless-stopped
    depends_on:
      core:
        condition: service_started
      content:
        condition: service_started
      intel:
        condition: service_started
    expose:
      - "80"
    mem_limit: 256m

  nginx:
    image: nginx:1.27-alpine
    container_name: atlas-nginx
    restart: unless-stopped
    depends_on:
      core:
        condition: service_started
      content:
        condition: service_started
      intel:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m

volumes:
  sqlserver-data:
