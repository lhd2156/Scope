  <body>
    <div id="app"></div>
    <script type="module">
      (() => {
        if (import.meta.env.VITE_DEMO_MODE !== 'true') {
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const qaSession = params.get('atlasQaSession');

        if (!qaSession) {
          return;
        }

        document.documentElement.dataset.atlasQa = 'true';
        window.localStorage.setItem('atlas-analytics-consent', 'denied');
        window.localStorage.setItem('atlas-onboarding-completed-v1', 'completed');

        if (qaSession === 'authenticated') {
          window.localStorage.setItem(
            'atlas-auth-session-hint',
            JSON.stringify({
              version: 1,
              hasSessionCookie: true,
              lastAuthenticatedAt: new Date().toISOString(),
            }),
          );
        } else {
          window.localStorage.removeItem('atlas-auth-session-hint');
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
