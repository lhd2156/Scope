name: Atlas CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: atlas-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Atlas.Core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Atlas.Core.sln

      - name: Build
        run: dotnet build Atlas.Core.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Atlas.Core.sln --configuration Release --no-build

  content:
    name: Content (Django)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: atlas_content
    env:
      DJANGO_SECRET_KEY: atlas-ci-django-secret
      DEBUG: "false"
      ALLOWED_HOSTS: localhost,127.0.0.1
      FRONTEND_ORIGIN: http://localhost:5173
      DEVELOPMENT_FRONTEND_ORIGIN: http://localhost:5173
      CORE_JWT_SECRET: atlas-ci-core-jwt-secret
      CORE_JWT_ISSUER: atlas-core
      CORE_JWT_AUDIENCE: atlas-frontend
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: atlas-ci
      KAFKA_ENABLED: "false"
      DJANGO_CACHE_BACKEND: django.core.cache.backends.locmem.LocMemCache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: atlas_content/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Test
        run: python -m pytest

  intel:
    name: Intel (Flask)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: atlas_intel
    env:
      FLASK_SECRET_KEY: atlas-ci-flask-secret
      CORE_JWT_SECRET: atlas-ci-core-jwt-secret
      CORE_JWT_ISSUER: atlas-core
      CORE_JWT_AUDIENCE: atlas-frontend
      FRONTEND_ORIGIN: http://localhost:5173
      FLASK_DATABASE_URL: sqlite:///atlas_intel_ci.db
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      CONTENT_SERVICE_URL: http://localhost:8000/api/content
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: atlas_intel/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Test
        run: python -m pytest tests

  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: atlas-frontend
    env:
      VITE_MAPBOX_TOKEN: pk.test-token
      VITE_API_BASE_URL: /
      VITE_ENABLE_AUTH_MOCK_FALLBACK: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: atlas-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
