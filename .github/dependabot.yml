version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: nuget
    directory: /Atlas.Core
    schedule:
      interval: weekly
      day: monday
      time: '09:10'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    commit-message:
