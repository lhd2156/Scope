<!doctype html>
<html lang="en-US" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-primary: #0f0f1a;
        --bg-secondary: #1a1a2e;
        --text-primary: #f0f0f5;
        --text-secondary: #a0a0b8;
        --accent-teal: #10b981;
        --border: rgba(255, 255, 255, 0.08);
        --glass-bg: rgba(26, 26, 46, 0.78);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at top, rgba(16, 185, 129, 0.16), transparent 42%),
          linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
        color: var(--text-primary);
      }

      main {
        width: min(100%, 32rem);
        padding: 32px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
      }

      p {
        margin: 0 0 16px;
        color: var(--text-secondary);
        line-height: 1.6;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 4vw, 2.5rem);
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        background: var(--accent-teal);
        color: #081411;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Atlas</p>
      <h1>You’re offline right now.</h1>
      <p>
        Reconnect to keep exploring community-loved spots, planning trips, and syncing your latest mapped stories.
      </p>
      <a href="/">Try Atlas again</a>
    </main>
  </body>
</html>
