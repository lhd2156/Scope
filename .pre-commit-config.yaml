# Scope pre-commit hooks
# Install with: `pip install pre-commit && pre-commit install`
# Hooks run on `git commit` and in CI (see detect-secrets in ci.yml if added).

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: check-json
        exclude: '^scope-frontend/tsconfig.*\.json$'
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ['protect', '--verbose', '--redact', '--staged']

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'package-lock\.json|.*\.min\.(js|css)$|node_modules/|dist/|coverage/'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ['--fix']
        files: '^(scope_content|scope_intel|scope-metrics|scope-cli|scripts)/.*\.py$'

  - repo: local
    hooks:
      - id: forbid-hardcoded-scope-dev-password
        name: Forbid legacy Scope_Dev_2026! literal
        entry: bash -c 'if git diff --cached | grep -E "Scope_Dev_[0-9]+!" >/dev/null; then echo "Refusing to commit Scope_Dev_... password literal. Rotate the secret and use CHANGE_ME_* in examples."; exit 1; fi'
        language: system
        pass_filenames: false
