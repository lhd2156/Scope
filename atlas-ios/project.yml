# XcodeGen spec — run `xcodegen generate` in this folder to produce Atlas.xcodeproj.
# We don't commit the .xcodeproj itself; this YAML is the source of truth.
#
# Install XcodeGen once:
#   brew install xcodegen
#
# Then:
#   cd atlas-ios
#   xcodegen generate
#   open Atlas.xcodeproj
#
# The app target links the local SwiftPM package `AtlasKit`, so everything in
# Sources/AtlasKit is available at runtime. CI does not need the .xcodeproj;
# `swift build` / `swift test` uses Package.swift directly.

name: Atlas
options:
  bundleIdPrefix: com.atlas
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  AtlasKit:
    path: .

targets:
  Atlas:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: AtlasKit
        product: AtlasKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atlas.mobile
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        DEVELOPMENT_LANGUAGE: en
