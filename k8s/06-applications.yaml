apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: scope
  labels:
    app.kubernetes.io/name: core
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: core
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: scope
  labels:
    app.kubernetes.io/name: core
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core
        app.kubernetes.io/part-of: scope-platform
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: core
          image: ghcr.io/lhd2156/scope/scope-core:deploy-placeholder
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: scope-shared-config
          env:
            - name: CORE_DB_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: CORE_DB_CONNECTION
            - name: ConnectionStrings__CoreDatabase
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: ConnectionStrings__CoreDatabase
            - name: CORE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: CORE_JWT_SECRET
            - name: GRPC_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: GRPC_INTERNAL_TOKEN
            - name: WEB_PUSH_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: WEB_PUSH_PRIVATE_KEY
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /api/core/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/core/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
