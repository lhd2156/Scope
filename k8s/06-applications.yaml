apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: atlas
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: atlas-platform
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: atlas
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: atlas-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: atlas-platform
    spec:
      containers:
        - name: frontend
          image: ghcr.io/replace-me/atlas-frontend:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
