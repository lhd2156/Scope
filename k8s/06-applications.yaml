apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-celery
  namespace: scope
  labels:
    app.kubernetes.io/name: content-celery
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: content-celery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: content-celery
        app.kubernetes.io/part-of: scope-platform
    spec:
      automountServiceAccountToken: false
      serviceAccountName: content-aws
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        fsGroup: 10002
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: content-celery
          image: ghcr.io/lhd2156/scope/scope-content:deploy-placeholder
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          command:
            - celery
            - -A
            - scope_content
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - default,sentiment,classification,reindex
          envFrom:
            - configMapRef:
                name: scope-shared-config
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: DJANGO_SECRET_KEY
            - name: DJANGO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: DJANGO_DATABASE_URL
            - name: CORE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: CORE_JWT_SECRET
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: RABBITMQ_PASS
            - name: RUN_MIGRATIONS_ON_STARTUP
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - celery
                - -A
                - scope_content
                - inspect
                - ping
                - --timeout
                - "5"
            initialDelaySeconds: 30
            periodSeconds: 30
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - scope_content
                - inspect
                - ping
                - --timeout
                - "5"
            initialDelaySeconds: 60
            periodSeconds: 45
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: media
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
