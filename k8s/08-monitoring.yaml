apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: scope
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: scope-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: scope-metrics
        scrape_interval: 15s
        metrics_path: /metrics
        static_configs:
          - targets:
              - scope-metrics.scope.svc.cluster.local:9090

      - job_name: core
        scrape_interval: 15s
        metrics_path: /metrics
        static_configs:
          - targets:
              - core.scope.svc.cluster.local:8080

      - job_name: content
        scrape_interval: 15s
        metrics_path: /metrics
        static_configs:
          - targets:
              - content.scope.svc.cluster.local:8000

      - job_name: intel
        scrape_interval: 15s
        metrics_path: /metrics
        static_configs:
          - targets:
              - intel.scope.svc.cluster.local:5000
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: scope
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: scope
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: scope-platform
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: scope
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: scope-platform
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Scope Prometheus
        uid: scope-prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.scope.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: scope
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: scope-platform
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: scope
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: scope-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: scope-platform
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scope-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: grafana-storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-storage
          emptyDir: {}
