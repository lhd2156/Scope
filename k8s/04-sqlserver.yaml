apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  namespace: atlas
  labels:
    app.kubernetes.io/name: sqlserver
    app.kubernetes.io/part-of: atlas-platform
spec:
  selector:
    app.kubernetes.io/name: sqlserver
  ports:
    - name: tds
      port: 1433
      targetPort: 1433
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserver-data
  namespace: atlas
  labels:
    app.kubernetes.io/name: sqlserver
    app.kubernetes.io/part-of: atlas-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sqlserver
  namespace: atlas
  labels:
    app.kubernetes.io/name: sqlserver
    app.kubernetes.io/part-of: atlas-platform
spec:
  serviceName: sqlserver
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sqlserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sqlserver
        app.kubernetes.io/part-of: atlas-platform
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
              name: tds
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: Express
            - name: MSSQL_MEMORY_LIMIT_MB
              value: "512"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: SA_PASSWORD
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: sqlserver-data
          persistentVolumeClaim:
            claimName: sqlserver-data
