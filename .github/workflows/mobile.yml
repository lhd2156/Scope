name: Atlas Mobile CI

on:
  push:
    paths:
      - 'atlas-ios/**'
      - 'atlas-android/**'
      - 'atlas-assets/**'
      - '.github/workflows/mobile.yml'
    branches: [main]
  pull_request:
    paths:
      - 'atlas-ios/**'
      - 'atlas-android/**'
      - 'atlas-assets/**'
      - '.github/workflows/mobile.yml'
  workflow_dispatch:

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------- iOS / AtlasKit (Swift Package) ---------------------------------
  ios:
    name: iOS — swift build + test
    runs-on: macos-14
    defaults:
      run:
        working-directory: atlas-ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build --configuration debug

      - name: Test
        run: swift test --parallel

  # -------- Android ---------------------------------------------------------
  android:
    name: Android — assemble + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('atlas-android/**/*.gradle*', 'atlas-android/gradle/wrapper/gradle-wrapper.properties', 'atlas-android/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap Gradle wrapper
        # The wrapper jar is intentionally not checked in. Generate it once so
        # `./gradlew` works on CI.
        run: gradle wrapper --gradle-version=8.9

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: atlas-android-debug
          path: atlas-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
